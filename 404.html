<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#15161a" media="(prefers-color-scheme: dark)">
  <meta name="robots" content="noindex">
  <meta name="description" content="Page not found.">
  <title>Page not found · MinimalistPicks</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+Pro:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231f1f1d'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-size='20' text-anchor='middle' fill='%23fafaf7'%3EM%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body data-page="legal">

  <div data-site-header></div>

  <main>
    <div class="notfound">
      <div class="big">404</div>
      <p>This page wandered off. Perhaps it's been quietly retired, or you followed a stale link.</p>
      <a class="btn" id="home-link" href="/">← Back to home</a>
    </div>
  </main>

  <div data-site-footer></div>

  <script src="config.js"></script>
  <script src="articles.js"></script>
  <script src="assets/main.js" defer></script>
  <script>
    // Auto-correct the home link for GitHub Pages subfolders
    document.addEventListener('DOMContentLoaded', () => {
      const seg = location.pathname.split('/').filter(Boolean);
      let base = '/';
      if (location.hostname.endsWith('github.io') && seg.length > 0 && !seg[0].includes('.')) {
        base = '/' + seg[0] + '/';
      }
      const a = document.getElementById('home-link');
      if (a) a.href = base;
    });
  </script>
</body>
</html>
